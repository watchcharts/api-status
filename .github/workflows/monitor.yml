name: Uptime check

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (~720 credits / rolling 24h)
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: uptime
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run checks
        id: check
        env:
          WATCHCHARTS_API_KEY: ${{ secrets.WATCHCHARTS_API_KEY }}
        run: python3 scripts/check.py

      - name: Open incident issue (notifies watchers by email)
        if: steps.check.outputs.transition == 'down'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create incident --color d73a4a \
            --description "API downtime" --force || true
          gh issue create \
            --title "🔴 API downtime detected ${{ steps.check.outputs.ts }}" \
            --label incident \
            --body "Automated monitoring detected downtime on api.watchcharts.com.

          **Failing checks:** ${{ steps.check.outputs.details }}

          Live status: https://status.api.watchcharts.com
          This issue will be closed automatically when checks recover."

      - name: Close incident issue (recovery)
        if: steps.check.outputs.transition == 'recovered'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for n in $(gh issue list --label incident --state open --json number --jq '.[].number'); do
            gh issue close "$n" --comment \
              "✅ Recovered at ${{ steps.check.outputs.ts }} — all checks passing again."
          done

      - name: Commit history
        run: |
          git config user.name "uptime-bot"
          git config user.email "actions@github.com"
          git add docs/data/history.json
          git diff --cached --quiet || git commit -m "uptime: $(date -u +%FT%TZ)"
          git pull --rebase origin ${{ github.ref_name }}
          git push
